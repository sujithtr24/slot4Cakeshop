<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account - SweetCake</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- <link rel="stylesheet" href="./css/register.css"> -->

    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{

        min-height: 100vh;

        background:
        linear-gradient(
            rgba(255, 248, 245, 0.88),
            rgba(255, 248, 245, 0.88)
        ),
        url("a_bright_softly_lit_pastel_dessert_scene_in_a_coz.png");

        background-size: cover;
        background-position: center;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 20px;

        font-family: Arial, Helvetica, sans-serif;
    }

    /* Signup Box */
    .signup-box{

        width: 100%;
        max-width: 520px;

        background: rgba(255,255,255,0.94);

        backdrop-filter: blur(12px);

        border-radius: 30px;

        padding: 45px;

        box-shadow: 0 15px 45px rgba(0,0,0,0.12);

        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn{

        from{
            opacity: 0;
            transform: translateY(30px);
        }

        to{
            opacity: 1;
            transform: translateY(0);
        }

    }

    /* Logo */
    .signup-logo{

        text-align: center;
        margin-bottom: 10px;
    }

    .signup-logo h1{

        font-size: 42px;
        font-weight: 800;
        color: #ff4d6d;
    }

    .signup-logo span{
        color: #2d1e1e;
    }

    /* Heading */
    .signup-heading{

        text-align: center;
        margin-bottom: 35px;
    }

    .signup-heading h2{

        font-size: 34px;
        font-weight: 800;
        color: #2d1e1e;
        margin-bottom: 10px;
    }

    .signup-heading p{

        color: #666;
        font-size: 16px;
    }

    /* Input Group */
    .input-group-custom{

        margin-bottom: 22px;
    }

    .input-group-custom label{

        display: block;
        margin-bottom: 10px;

        font-size: 15px;
        font-weight: 600;

        color: #444;
    }

    /* Input Box */
    .input-box{

        position: relative;
    }

    .input-box input{

        width: 100%;

        padding: 15px 18px 15px 50px;

        border: 2px solid #f1d6dc;

        border-radius: 14px;

        font-size: 16px;

        outline: none;

        transition: 0.3s;
    }

    .input-box input:focus{

        border-color: #ff4d6d;

        box-shadow: 0 0 10px rgba(255, 77, 109, 0.15);
    }

    .input-box i{

        position: absolute;

        top: 50%;
        left: 18px;

        transform: translateY(-50%);

        color: #ff4d6d;

        font-size: 18px;
    }

    /* Signup Button */
    .signup-btn{

        width: 100%;

        border: none;

        background: linear-gradient(
            to right,
            #ff4d6d,
            #ff758f
        );

        color: white;

        padding: 15px;

        border-radius: 14px;

        font-size: 17px;
        font-weight: 700;

        margin-top: 10px;

        transition: 0.4s;

        box-shadow: 0 10px 25px rgba(255, 77, 109, 0.25);
    }

    .signup-btn:hover{

        transform: translateY(-4px);

        box-shadow: 0 15px 30px rgba(255, 77, 109, 0.35);
    }

    /* Divider */
    .divider{

        text-align: center;

        margin: 28px 0;

        position: relative;
    }

    .divider::before{

        content: "";

        position: absolute;

        width: 100%;
        height: 1px;

        background: #ddd;

        left: 0;
        top: 50%;
    }

    .divider span{

        position: relative;

        background: white;

        padding: 0 15px;

        color: #777;

        font-size: 14px;
    }

    /* Login Text */
    .login-text{

        text-align: center;
    }

    .login-text p{

        color: #555;

        font-size: 15px;

        margin-bottom: 0;
    }

    .login-text a{

        color: #ff4d6d;

        text-decoration: none;

        font-weight: 700;

        transition: 0.3s;
    }

    .login-text a:hover{

        color: #d63352;
    }

    /* Responsive */
    @media(max-width: 576px){

        .signup-box{

            padding: 35px 25px;
        }

        .signup-logo h1{

            font-size: 34px;
        }

        .signup-heading h2{

            font-size: 28px;
        }

    }

    </style>

</head>

<body>

    <!-- Signup Box -->
    <div class="signup-box">

        <!-- Logo -->
        <div class="signup-logo">

            <h1>
                Sweet<span>Cake</span>
            </h1>

        </div>

        <!-- Heading -->
        <div class="signup-heading">

            <h2>Create Account</h2>

            <p>
                Join SweetCake and enjoy delicious moments with us
            </p>

        </div>

        <!-- Form -->
        <form method="POST">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="input-group-custom">

                <label>Full Name</label>

                <div class="input-box">

                    <i class="bi bi-person-fill"></i>

                    <input type="text" placeholder="Enter your full name" name="fullname">

                </div>

            </div>

            <!-- Email -->
            <div class="input-group-custom">

                <label>Email Address</label>

                <div class="input-box">

                    <i class="bi bi-envelope-fill"></i>

                    <input type="email" placeholder="Enter your email" name="email">

                </div>

            </div>

            <!-- Phone -->
            <div class="input-group-custom">

                <label>Phone Number</label>

                <div class="input-box">

                    <i class="bi bi-telephone-fill"></i>

                    <input type="tel" placeholder="Enter your phone number" name="phone">

                </div>

            </div>

            <!-- Password -->
            <div class="input-group-custom">

                <label>Password</label>

                <div class="input-box">

                    <i class="bi bi-lock-fill"></i>

                    <input type="password" placeholder="Create a password" name="password">

                </div>

            </div>

            <!-- Signup Button -->
            <button class="signup-btn">

                Create Account

            </button>

        </form>

        <!-- Divider -->
        <div class="divider">

            <span>OR</span>

        </div>

        <!-- Login Text -->
        <div class="login-text">

            <p>
                Already have an account?
                <a href="{% url 'login' %}">
                    Login Here
                </a>
            </p>

        </div>

    </div>

</body>

</html>
