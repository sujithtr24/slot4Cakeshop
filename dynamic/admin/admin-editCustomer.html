{% extends 'admin/admin-base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card mt-4">
            <div class="form-header-title-container mb-4 pb-2 border-bottom border-light">
                <h4 class="text-dark fw-bold mb-1">Edit Customer Profile</h4>
                <p class="text-muted small">Modify the user account details. Note that Customer ID cannot be changed.</p>
            </div>
            
            <form id="editCustomerForm" method="POST">
                {% csrf_token %}
                
                <div class="row">
                    <!-- Customer ID (Readonly) -->
                    <div class="col-md-6 form-group-custom">
                        <label for="customerId">
                            <i class="bi bi-hash text-primary me-2"></i>Customer ID
                        </label>
                        <input type="text" class="form-input-custom" id="customerId" value="{{ customer.id }}" readonly style="background-color: #f8f9fa; cursor: not-allowed; border-color: #dee2e6; opacity: 0.8;">
                    </div>

                    <!-- Phone Number -->
                    <div class="col-md-6 form-group-custom">
                        <label for="customerPhone">
                            <i class="bi bi-telephone-fill text-primary me-2"></i>Phone Number
                        </label>
                        <input name="customer_phone" type="text" class="form-input-custom" id="customerPhone" value="{{ customer.customer_phone }}" required>
                    </div>

                    <!-- Full Name -->
                    <div class="col-12 form-group-custom">
                        <label for="customerName">
                            <i class="bi bi-person-fill text-primary me-2"></i>Full Name
                        </label>
                        <input name="customer_name" type="text" class="form-input-custom" id="customerName" value="{{ customer.customer_name }}" required>
                    </div>

                    <!-- Email Address -->
                    <div class="col-12 form-group-custom">
                        <label for="customerEmail">
                            <i class="bi bi-envelope-fill text-primary me-2"></i>Email Address
                        </label>
                        <input name="customer_email" type="email" class="form-input-custom" id="customerEmail" value="{{ customer.customer_email }}" required>
                    </div>
                </div>

                <div class="form-actions-footer">
                    <a href="{% url 'adminCustomers' %}" class="btn-form-reset text-decoration-none d-inline-flex align-items-center justify-content-center">Cancel</a>
                    <button type="submit" class="btn-form-submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
